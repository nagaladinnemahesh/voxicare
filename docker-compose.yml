version: "3.8"

services:
  postgres:
    image: postgres:14-alpine
    container_name: voxicare_db
    restart: always
    environment:
      POSTGRES_DB: voxicare
      POSTGRES_USER: voxicare_user
      POSTGRES_PASSWORD: voxicare123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voxicare_user -d voxicare"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: voxicare_server
    restart: always
    environment:
      DATABASE_URL: postgresql://voxicare_user:voxicare123@postgres:5432/voxicare
      JWT_SECRET: voxicare_super_secret_jwt_key_2026
      NODE_ENV: production
      PORT: 3001
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: voxicare_web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  postgres_data:
